<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1RM 계산기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="no-nav">

<div th:replace="~{fragments/layout :: topbar(title='1RM 계산기', backUrl=@{/menu})}"></div>

<div class="page" style="padding-top: 8px;">

    <p class="section-sub" style="margin-top: 8px;">
        5대 운동(스쿼트·벤치프레스·데드리프트·오버헤드프레스·바벨로우) 각각의 무게와 반복 횟수를 넣으면
        에플리(Epley) 공식으로 1RM을 추정해요: <b>1RM = 무게 × (1 + 반복 / 30)</b>
    </p>

    <div id="liftCards"></div>

    <h2 class="section-title">한눈에 보기</h2>
    <div class="card" style="padding: 4px 12px;">
        <div class="exercise-row" th:each="lift : ${lifts}">
            <div class="exercise-info">
                <div class="exercise-name" th:text="${lift}">스쿼트</div>
            </div>
            <div class="exercise-name" th:id="'summary-' + ${liftStat.index}">-</div>
        </div>
        <div class="exercise-row" style="border-top: 2px solid var(--border); margin-top: 4px;">
            <div class="exercise-info">
                <div class="exercise-name" style="color: var(--accent);">5대 운동 합계</div>
            </div>
            <div class="exercise-name" id="summaryTotal" style="color: var(--accent); font-weight: 800;">-</div>
        </div>
    </div>

</div>

<script th:inline="javascript">
    const lifts = /*[[${lifts}]]*/ [];

    function calc1RM(w, r) {
        if (!w || w <= 0) return 0;
        if (!r || r <= 1) return w;
        return w * (1 + r / 30);
    }

    function renderCards() {
        const wrap = document.getElementById("liftCards");
        wrap.innerHTML = lifts.map((name, i) => `
            <div class="card">
                <div class="routine-card-title" style="margin-bottom: 10px;">${name}</div>
                <div class="form-group" style="display:flex; gap:8px; margin-bottom: 0;">
                    <div style="flex:1;">
                        <label class="form-label">무게(kg)</label>
                        <input class="form-input" type="number" step="0.5" min="0" id="w-${i}" oninput="updateAll()">
                    </div>
                    <div style="flex:1;">
                        <label class="form-label">반복</label>
                        <input class="form-input" type="number" min="1" max="20" id="r-${i}" oninput="updateAll()">
                    </div>
                    <div style="flex:1;">
                        <label class="form-label">예상 1RM</label>
                        <div class="form-input" id="result-${i}" style="text-align:center; font-weight:700; color:var(--accent);">0kg</div>
                    </div>
                </div>
            </div>
        `).join("");
    }

    function updateAll() {
        let total = 0;
        lifts.forEach((name, i) => {
            const w = parseFloat(document.getElementById("w-" + i).value) || 0;
            const r = parseInt(document.getElementById("r-" + i).value) || 0;
            const oneRm = calc1RM(w, r);
            document.getElementById("result-" + i).textContent = oneRm.toFixed(1) + "kg";
            const summaryEl = document.getElementById("summary-" + i);
            if (summaryEl) summaryEl.textContent = oneRm > 0 ? oneRm.toFixed(1) + "kg" : "-";
            total += oneRm;
        });
        document.getElementById("summaryTotal").textContent = total > 0 ? total.toFixed(1) + "kg" : "-";
    }

    renderCards();
    updateAll();
</script>

</body>
</html>
