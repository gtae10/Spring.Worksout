<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 루틴 그룹</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="no-nav">

<div th:replace="~{fragments/layout :: topbar(title='새 루틴 그룹', backUrl=@{/member/main})}"></div>

<div class="page" style="padding-top: 8px;">

    <p class="section-sub" style="margin-top: 8px;">미리보기</p>
    <div class="card routine-card">
        <span class="routine-card-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z" fill="currentColor"/></svg>
        </span>
        <div class="routine-card-body">
            <div class="routine-card-title" id="previewTitle">새 루틴 그룹</div>
            <span class="routine-card-meta">0개 운동</span>
        </div>
    </div>

    <form th:action="@{/routinegroup/new}" method="post" style="margin-top: 18px;">
        <div class="form-group">
            <label class="form-label">그룹 이름</label>
            <input class="form-input" type="text" name="title" placeholder="예: 올라잇 어깨"
                   oninput="document.getElementById('previewTitle').textContent = this.value || '새 루틴 그룹'" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">만들기</button>
    </form>
</div>

</body>
</html>
