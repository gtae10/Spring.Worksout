<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루틴 선택</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="no-nav">

<div th:replace="~{fragments/layout :: topbar(title='루틴 선택', backUrl=@{/calender/calender})}"></div>

<div class="page" style="padding-top: 8px;">

    <p class="section-sub" th:text="'선택한 날짜: ' + ${date}" style="margin-top: 8px;">선택한 날짜</p>

    <form th:action="@{/calender/assign}" method="post">
        <input type="hidden" name="date" th:value="${date}">
        <div class="form-group">
            <label class="form-label">루틴 그룹</label>
            <select name="groupId" class="form-select" required>
                <option th:each="g : ${groups}" th:value="${g.id}" th:text="${g.title}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary btn-block">이 루틴으로 배정</button>
    </form>

    <a th:href="@{/routinegroup/new}" class="btn btn-secondary btn-block" style="margin-top: 10px;">+ 새 루틴 생성</a>

</div>

<script>
    const urlParams = new URLSearchParams(location.search);
    if (urlParams.get("duplicate") === "true") {
        alert("이미 해당 날짜에 루틴이 설정되어 있습니다.");
    }
</script>

</body>
</html>
