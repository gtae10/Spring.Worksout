<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기록</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
</head>

<body>

<div th:replace="~{fragments/layout :: topbar(title='기록', backUrl=@{/member/main})}"></div>
<div th:replace="~{fragments/layout :: navbar(active='record')}"></div>

<div class="page">
    <p class="section-sub" style="margin-top: 14px;">날짜를 눌러서 그날의 루틴을 배정하거나 기록을 확인해보세요. 이미 배정된 날짜는 <b>우클릭</b>하면 삭제할 수 있어요.</p>
    <div id="calendar"></div>
</div>

<!-- 우클릭 컨텍스트 메뉴 -->
<div id="ctxMenu" class="ctx-menu">
    <button type="button" onclick="confirmDeleteCalender()">🗑 이 날짜 루틴 삭제</button>
</div>

<!-- 삭제 전송용 히든 폼 -->
<form id="deleteCalenderForm" th:action="@{/calender/delete}" method="post" style="display:none;">
    <input type="hidden" name="date" id="deleteCalenderDate">
</form>

<script th:inline="javascript">
    const assignedDates = /*[[${assignedDates}]]*/ [];
    let ctxTargetDate = null;

    document.addEventListener("DOMContentLoaded", function () {
        const calendarEl = document.getElementById("calendar");

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: "dayGridMonth",
            selectable: true,
            height: "auto",
            headerToolbar: { left: "prev,next today", center: "title", right: "" },

            events: assignedDates.map(item => ({
                title: item.title,
                start: item.date,
                textColor: "#fff",
                backgroundColor: "#ff4433",
                borderColor: "#ff4433"
            })),

            dateClick: function(info) {
                window.location.href = "/calender/select?date=" + info.dateStr;
            },

            eventClick: function(info) {
                window.location.href = "/calender/select?date=" + info.event.startStr;
            },

            eventDidMount: function(info) {
                info.el.addEventListener("contextmenu", function (e) {
                    e.preventDefault();
                    showCtxMenu(e.pageX, e.pageY, info.event.startStr);
                });
            }
        });

        calendar.render();
    });

    function showCtxMenu(x, y, date) {
        ctxTargetDate = date;
        const menu = document.getElementById("ctxMenu");
        menu.style.left = x + "px";
        menu.style.top = y + "px";
        menu.style.display = "block";
    }

    function hideCtxMenu() {
        document.getElementById("ctxMenu").style.display = "none";
    }

    function confirmDeleteCalender() {
        hideCtxMenu();
        if (!ctxTargetDate) return;
        if (!confirm(ctxTargetDate + " 날짜의 루틴 배정을 삭제할까요?\n그날 기록해둔 세트도 함께 삭제돼요.")) return;
        document.getElementById("deleteCalenderDate").value = ctxTargetDate;
        document.getElementById("deleteCalenderForm").submit();
    }

    window.addEventListener("click", hideCtxMenu);
    window.addEventListener("scroll", hideCtxMenu);
</script>
</body>
</html>
