<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기록</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
</head>

<body>

<div th:replace="~{fragments/layout :: topbar(title='기록', backUrl=@{/member/main})}"></div>
<div th:replace="~{fragments/layout :: navbar(active='record')}"></div>

<div class="page">
    <p class="section-sub" style="margin-top: 14px;">날짜를 눌러서 그날의 루틴을 배정하거나 기록을 확인해보세요.</p>
    <div id="calendar"></div>
</div>

<script th:inline="javascript">
    const assignedDates = /*[[${assignedDates}]]*/ [];

    document.addEventListener("DOMContentLoaded", function () {
        const calendarEl = document.getElementById("calendar");

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: "dayGridMonth",
            selectable: true,
            height: "auto",
            headerToolbar: { left: "prev,next today", center: "title", right: "" },

            events: assignedDates.map(item => ({
                title: item.title,
                start: item.date,
                textColor: "#fff",
                backgroundColor: "#ff4433",
                borderColor: "#ff4433"
            })),

            dateClick: function(info) {
                window.location.href = "/calender/select?date=" + info.dateStr;
            }
        });

        calendar.render();
    });
</script>
</body>
</html>
