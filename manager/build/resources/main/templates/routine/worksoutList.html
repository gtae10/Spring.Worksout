<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${groupTitle}">루틴 상세</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: topbar(title=${groupTitle}, backUrl=@{/member/main})}"></div>
<div th:replace="~{fragments/layout :: navbar(active='home')}"></div>

<div class="page">

    <!-- 이 루틴에 포함된 운동 부위 태그 -->
    <div class="part-hero">
        <span class="part-pill" th:each="part : ${bodyParts}" th:text="${part}">부위</span>
        <span th:if="${#lists.isEmpty(bodyParts)}" style="color: var(--text-faint); font-size: 14px;">아직 등록된 운동이 없어요</span>
    </div>

    <div th:if="${#lists.isEmpty(routines)}" class="empty-state">
        + 운동 추가 버튼을 눌러 첫 운동을 등록해보세요.
    </div>

    <div class="card" th:unless="${#lists.isEmpty(routines)}" style="padding: 6px 12px;">
        <div class="exercise-row" th:each="r, iter : ${routines}">
            <a th:href="@{/routine/{id}/detail(id=${r.id})}" style="display:flex; align-items:center; gap:12px; flex:1; min-width:0;">
                <span class="exercise-num" th:text="${iter.count}">1</span>
                <div class="exercise-info">
                    <div class="exercise-name" th:text="${r.workout}">운동명</div>
                    <div class="exercise-part"
                         th:text="${r.sets} + '세트 · ' + ${r.reps} + '회' + (${r.weight} > 0 ? ' · ' + ${r.weight} + 'kg' : '')">
                        3세트 · 15회
                    </div>
                </div>
            </a>
            <form th:action="@{/routine/delete/{id}/{groupId}(id=${r.id}, groupId=${groupId})}" method="post"
                  onsubmit="return confirm('이 운동을 루틴에서 삭제할까요?');">
                <button type="submit" class="btn-icon" title="삭제">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </form>
        </div>
    </div>

    <a class="btn btn-primary btn-block" style="margin-top: 18px;"
       th:href="@{/routine/list(groupId=${groupId})}">+ 운동 추가</a>

</div>

</body>
</html>
