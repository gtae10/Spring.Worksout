<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운동 검색</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: topbar(title='운동 검색', backUrl=@{/routine/group/{groupId}(groupId=${groupId})})}"></div>
<div th:replace="~{fragments/layout :: navbar(active='home')}"></div>

<div class="page">

    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="운동명을 입력하세요" onkeyup="searchExercise()">
    </div>

    <div class="chip-row">
        <label class="chip" th:classappend="${selectedPart == '전체'} ? 'active' : ''"
               th:onclick="|location.href='@{/routine/list(bodyPart='전체', groupId=${groupId})}'|">전체</label>
        <label class="chip" th:classappend="${selectedPart == '가슴'} ? 'active' : ''"
               th:onclick="|location.href='@{/routine/list(bodyPart='가슴', groupId=${groupId})}'|">가슴</label>
        <label class="chip" th:classappend="${selectedPart == '등'} ? 'active' : ''"
               th:onclick="|location.href='@{/routine/list(bodyPart='등', groupId=${groupId})}'|">등</label>
        <label class="chip" th:classappend="${selectedPart == '어깨'} ? 'active' : ''"
               th:onclick="|location.href='@{/routine/list(bodyPart='어깨', groupId=${groupId})}'|">어깨</label>
        <label class="chip" th:classappend="${selectedPart == '팔'} ? 'active' : ''"
               th:onclick="|location.href='@{/routine/list(bodyPart='팔', groupId=${groupId})}'|">팔</label>
        <label class="chip" th:classappend="${selectedPart == '하체'} ? 'active' : ''"
               th:onclick="|location.href='@{/routine/list(bodyPart='하체', groupId=${groupId})}'|">하체</label>
    </div>

    <div id="exerciseTable" class="card exercise-list-scroll" style="padding: 4px 12px;">
        <div class="exercise-row" th:each="w : ${worksout}">
            <span class="exercise-avatar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 7v10M18 7v10M2 12h4M18 12h4M8 12h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </span>
            <div class="exercise-info">
                <div class="exercise-name" th:text="${w.workout}">운동명</div>
                <div class="exercise-part" th:if="${lastUsed[w.id] == null}" th:text="${w.part}">부위</div>
                <div class="exercise-part" th:if="${lastUsed[w.id] != null}"
                     th:text="${w.part} + ' · 지난번 ' + ${lastUsed[w.id].weight} + 'kg × ' + ${lastUsed[w.id].reps} + '회'">부위 · 지난번 기록</div>
            </div>
            <button type="button" class="btn-icon"
                    th:data-id="${w.id}" th:data-name="${w.workout}"
                    th:data-sets="${lastUsed[w.id] != null} ? ${lastUsed[w.id].sets} : ''"
                    th:data-reps="${lastUsed[w.id] != null} ? ${lastUsed[w.id].reps} : ''"
                    th:data-weight="${lastUsed[w.id] != null} ? ${lastUsed[w.id].weight} : ''"
                    onclick="openModal(this)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
            </button>
        </div>
        <div th:if="${#lists.isEmpty(worksout)}" class="empty-state">해당하는 운동이 없어요.</div>
    </div>

</div>

<!-- 운동 등록 모달 -->
<div id="routineModal" class="modal">
    <div class="modal-content">
        <div class="modal-handle"></div>
        <button type="button" class="modal-close" onclick="closeModal()">&times;</button>
        <div class="modal-title" id="modalTitle">운동 등록</div>

        <form th:action="@{/routine/new/{groupId}(groupId=${groupId})}" method="post">
            <input type="hidden" name="worksOut.id" id="modalExerciseId">

            <div class="form-group">
                <label class="form-label">운동명</label>
                <input class="form-input" type="text" id="modalExerciseName" readonly>
            </div>
            <div class="form-group" style="display:flex; gap:8px;">
                <div style="flex:1;">
                    <label class="form-label">세트</label>
                    <input class="form-input" type="number" id="modalSets" name="sets" min="1" required>
                </div>
                <div style="flex:1;">
                    <label class="form-label">반복</label>
                    <input class="form-input" type="number" id="modalReps" name="reps" min="1" required>
                </div>
                <div style="flex:1;">
                    <label class="form-label">무게(kg)</label>
                    <input class="form-input" type="number" id="modalWeight" name="weight" step="0.5" min="0">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">등록</button>
        </form>
    </div>
</div>

<script>
    function openModal(btn) {
        const modal = document.getElementById("routineModal");
        document.getElementById("modalExerciseId").value = btn.getAttribute("data-id");
        document.getElementById("modalExerciseName").value = btn.getAttribute("data-name");
        document.getElementById("modalTitle").textContent = btn.getAttribute("data-name") + " 루틴 등록";

        // 지난번에 이 운동에 썼던 세트/반복/무게가 있으면 기본값으로 채워줌
        document.getElementById("modalSets").value = btn.getAttribute("data-sets") || "";
        document.getElementById("modalReps").value = btn.getAttribute("data-reps") || "";
        document.getElementById("modalWeight").value = btn.getAttribute("data-weight") || "";

        modal.style.display = "block";
    }

    function closeModal() {
        document.getElementById("routineModal").style.display = "none";
    }

    window.onclick = function(event) {
        const modal = document.getElementById("routineModal");
        if (event.target === modal) {
            modal.style.display = "none";
        }
    };

    function searchExercise() {
        const input = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.querySelectorAll(".exercise-row");
        rows.forEach(row => {
            const name = row.querySelector(".exercise-name").innerText.toLowerCase();
            row.style.display = name.includes(input) ? "" : "none";
        });
    }
</script>

</body>
</html>
