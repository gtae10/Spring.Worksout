<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 상단 앱바: title / backUrl(없으면 뒤로가기 버튼 숨김) -->
<div th:fragment="topbar(title, backUrl)" class="topbar">
    <a th:if="${backUrl != null}" th:href="${backUrl}" class="topbar-back">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <h1 class="topbar-title" th:text="${title}">Title</h1>
</div>

<!-- 상단 탭 네비게이션: active = home | record | menu -->
<nav th:fragment="navbar(active)" class="nav-bar">
    <a th:href="@{/member/main}" class="nav-item" th:classappend="${active == 'home'} ? 'active' : ''">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 11l8-7 8 7M6 10v9a1 1 0 001 1h3v-6h4v6h3a1 1 0 001-1v-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>홈</span>
    </a>
    <a th:href="@{/calender/calender}" class="nav-item" th:classappend="${active == 'record'} ? 'active' : ''">
        <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="15" rx="2" stroke="currentColor" stroke-width="2"/><path d="M4 9h16M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>기록</span>
    </a>
    <a href="#" class="nav-item" th:classappend="${active == 'stats'} ? 'active' : ''">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 19V10M12 19V5M19 19v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>통계</span>
    </a>
    <a th:href="@{/menu}" class="nav-item" th:classappend="${active == 'menu'} ? 'active' : ''">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>메뉴</span>
    </a>
</nav>

<!-- 체중 미입력 시 칼로리 계산용 체중 입력 유도 카드 -->
<div th:fragment="weightPrompt(returnTo)" class="card" style="padding:14px 16px;">
    <div style="font-size:13px; color:var(--text-dim); margin-bottom:8px;">체중을 입력하면 예상 칼로리도 같이 보여드려요</div>
    <form th:action="@{/member/weight}" method="post" style="display:flex; gap:8px;">
        <input type="hidden" name="returnTo" th:value="${returnTo}">
        <input class="form-input" type="number" name="weight" step="0.1" min="1" placeholder="체중(kg)" required style="flex:1;">
        <button type="submit" class="btn btn-secondary" style="padding:10px 16px; font-size:13px; flex-shrink:0;">저장</button>
    </form>
</div>

</body>
</html>
