<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="no-nav">

<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M6 7v10M18 7v10M2 12h4M18 12h4M8 12h8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </div>
        <h1 class="auth-title">RoutineManager</h1>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label">아이디</label>
                <input class="form-input" type="text" name="id" placeholder="ID를 입력하세요" required>
            </div>
            <div class="form-group">
                <label class="form-label">비밀번호</label>
                <input class="form-input" type="password" name="passWord" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">로그인</button>
        </form>

        <div th:if="${joined}" class="auth-success">
            회원가입이 완료됐어요! 로그인해주세요.
        </div>

        <div th:if="${param.error}" class="auth-error">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

        <div class="auth-links">
            아직 계정이 없으신가요?
            <a th:href="@{/member/new}" style="color: var(--accent); font-weight: 700;">회원가입</a>
        </div>
    </div>
</div>

</body>
</html>
