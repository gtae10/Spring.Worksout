<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="topbar">
    <h1 class="topbar-title" th:text="${session.loginMember.name} + '님'">홈</h1>
    <form action="/logout" method="post" style="margin:0;">
        <button type="submit" class="topbar-action" style="background:none;border:none;cursor:pointer;">로그아웃</button>
    </form>
</div>

<div th:replace="~{fragments/layout :: navbar(active='home')}"></div>

<div class="page">

    <div class="quick-actions">
        <a class="quick-action" th:href="@{/routinegroup/new}">
            <span class="quick-action-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
            </span>
            <span>새 그룹</span>
        </a>
        <a class="quick-action" th:href="@{/routine/my}">
            <span class="quick-action-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M6 7v10M18 7v10M2 12h4M18 12h4M8 12h8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
            </span>
            <span>루틴 설정</span>
        </a>
        <a class="quick-action" th:href="@{/calender/calender}">
            <span class="quick-action-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="15" rx="2" stroke="currentColor" stroke-width="2"/><path d="M4 9h16" stroke="currentColor" stroke-width="2"/></svg>
            </span>
            <span>기록</span>
        </a>
    </div>

    <h2 class="section-title">내 루틴</h2>

    <div th:if="${#lists.isEmpty(groups)}" class="empty-state">
        아직 만든 루틴 그룹이 없어요.<br>새 그룹을 만들고 운동을 추가해보세요.
    </div>

    <div class="routine-grid">
        <a class="card routine-card" th:each="group : ${groups}"
           th:href="@{/routine/group/{groupId}(groupId=${group.id})}">
            <span class="routine-card-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z" fill="currentColor"/></svg>
            </span>
            <div class="routine-card-body">
                <div class="routine-card-title" th:text="${group.title}">루틴 그룹</div>
                <span class="tag" th:if="${!group.bodyParts.isEmpty()}" th:text="${group.bodyParts}">부위</span>
                <span class="routine-card-meta" th:if="${group.bodyParts.isEmpty()}"
                      th:text="${group.routines.size()} + '개 운동'">0개 운동</span>
            </div>
        </a>
    </div>

    <a class="btn btn-primary btn-block" style="margin-top: 8px;" th:href="@{/routinegroup/new}">+ 새 루틴 만들기</a>

</div>

</body>
</html>
