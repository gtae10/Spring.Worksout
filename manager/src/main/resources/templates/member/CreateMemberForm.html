<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="no-nav">

<div th:replace="~{fragments/layout :: topbar(title='회원가입', backUrl=@{/login})}"></div>

<div class="auth-wrap" style="padding-top: 0;">
    <div class="auth-card">
        <div class="auth-logo">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M6 7v10M18 7v10M2 12h4M18 12h4M8 12h8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </div>
        <h1 class="auth-title">회원가입</h1>

        <form action="/member/new" method="post">
            <div class="form-group">
                <label class="form-label">아이디</label>
                <input class="form-input" type="text" name="id" placeholder="ID를 입력하세요" th:value="${prevId}" required>
            </div>
            <div class="form-group">
                <label class="form-label">비밀번호</label>
                <input class="form-input" type="password" name="passWord" placeholder="비밀번호를 입력하세요" required>
            </div>
            <div class="form-group">
                <label class="form-label">이름</label>
                <input class="form-input" type="text" name="name" placeholder="이름을 입력하세요" th:value="${prevName}" required>
            </div>
            <div class="form-group">
                <label class="form-label">체중(kg) <span style="color: var(--text-faint); font-weight: 400;">· 선택, 칼로리 계산용</span></label>
                <input class="form-input" type="number" name="weight" step="0.1" min="1" placeholder="예: 70">
            </div>
            <button type="submit" class="btn btn-primary btn-block">가입하기</button>
        </form>

        <div th:if="${error == 'duplicate'}" class="auth-error">
            이미 존재하는 아이디예요. 다른 아이디를 입력해주세요.
        </div>

        <div class="auth-links">
            이미 계정이 있으신가요?
            <a th:href="@{/login}" style="color: var(--accent); font-weight: 700;">로그인</a>
        </div>
    </div>
</div>

</body>
</html>
